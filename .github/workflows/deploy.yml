name: Deploy to Cloudflare

on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      services:
        description: 'Services to deploy (comma-separated: web,api,sync,auth or "all")'
        required: false
        default: all
      sync-secrets:
        description: 'Force sync secrets to Cloudflare Workers'
        type: boolean
        default: false

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: "20"

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      web: ${{ steps.filter.outputs.web }}
      api: ${{ steps.filter.outputs.api }}
      sync: ${{ steps.filter.outputs.sync }}
      auth: ${{ steps.filter.outputs.auth }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            web:
              - 'apps/web/**'
              - 'packages/**'
            api:
              - 'apps/api-cf/**'
              - 'apps/render-server/**'
              - 'packages/**'
            sync:
              - 'apps/loro-sync-server/**'
              - 'packages/**'
            auth:
              - 'apps/auth-gateway/**'

  deploy-web:
    name: Deploy Web (Cloudflare Pages)
    runs-on: ubuntu-latest
    needs: [changes]
    if: >
      github.event_name == 'workflow_dispatch' && (github.event.inputs.services == 'all' || contains(github.event.inputs.services, 'web'))
      || needs.changes.outputs.web == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 8

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build for Cloudflare Pages
        working-directory: apps/web
        run: pnpm cf:build
        env:
          API_CF_URL: ${{ vars.API_CF_URL }}
          BETTER_AUTH_URL: ${{ vars.BETTER_AUTH_URL }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/web
          command: pages deploy .open-next/assets --project-name=clash-flow

  deploy-api:
    name: Deploy API Worker
    runs-on: ubuntu-latest
    needs: [changes]
    if: >
      github.event_name == 'workflow_dispatch' && (github.event.inputs.services == 'all' || contains(github.event.inputs.services, 'api'))
      || needs.changes.outputs.api == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 8

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Sync secrets to Cloudflare
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/api-cf
          command: secret:bulk
          stdin: |
            {
              "GOOGLE_API_KEY": "${{ secrets.GOOGLE_API_KEY }}",
              "GOOGLE_AI_STUDIO_BASE_URL": "${{ secrets.GOOGLE_AI_STUDIO_BASE_URL }}",
              "CF_AIG_TOKEN": "${{ secrets.CF_AIG_TOKEN }}",
              "FAL_API_KEY": "${{ secrets.FAL_API_KEY }}",
              "FAL_GATEWAY_URL": "${{ secrets.FAL_GATEWAY_URL }}",
              "R2_PUBLIC_URL": "${{ secrets.R2_PUBLIC_URL }}",
              "KLING_ACCESS_KEY": "${{ secrets.KLING_ACCESS_KEY }}",
              "KLING_SECRET_KEY": "${{ secrets.KLING_SECRET_KEY }}",
              "JWT_SECRET": "${{ secrets.JWT_SECRET }}",
              "BETTER_AUTH_ORIGIN": "${{ secrets.BETTER_AUTH_ORIGIN }}",
              "WORKER_PUBLIC_URL": "${{ secrets.WORKER_PUBLIC_URL }}"
            }

      - name: Deploy API to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/api-cf
          command: deploy

  deploy-sync:
    name: Deploy Sync Server Worker
    runs-on: ubuntu-latest
    needs: [changes]
    if: >
      github.event_name == 'workflow_dispatch' && (github.event.inputs.services == 'all' || contains(github.event.inputs.services, 'sync'))
      || needs.changes.outputs.sync == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 8

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Deploy Sync Server to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/loro-sync-server
          command: deploy

  deploy-auth:
    name: Deploy Auth Gateway Worker
    runs-on: ubuntu-latest
    needs: [changes]
    if: >
      github.event_name == 'workflow_dispatch' && (github.event.inputs.services == 'all' || contains(github.event.inputs.services, 'auth'))
      || needs.changes.outputs.auth == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 8

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Deploy Auth Gateway to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/auth-gateway
          command: deploy

  migrate-d1:
    name: Run D1 Migrations
    runs-on: ubuntu-latest
    needs: [deploy-web]
    if: always() && needs.deploy-web.result == 'success'
    steps:
      - uses: actions/checkout@v4

      - name: Run D1 Migrations
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/web
          command: d1 migrations apply master-clash-frontend --remote
